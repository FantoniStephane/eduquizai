<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Architecture logicielle — EduQuizAI</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
  h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; color: #1a1a1a; }
  p { font-size: 13px; color: #666; margin-bottom: 32px; }
  svg { max-width: 800px; width: 100%; }
  .legende { margin-top: 24px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<h1>Architecture logicielle — EduQuizAI</h1>
<p>Schéma en couches · Stack : React / Django DRF / PostgreSQL / OpenAI API</p>
<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Utilisateur -->
  <rect x="260" y="20" width="160" height="44" rx="8" fill="#f1efea" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2c2c2a">Enseignant</text>

  <!-- Flèches utilisateur <-> frontend -->
  <line x1="340" y1="64" x2="340" y2="100" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="196" x2="340" y2="64" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Couche Présentation -->
  <rect x="80" y="100" width="520" height="64" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="340" y="122" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3c3489">Couche présentation</text>
  <text x="340" y="146" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534ab7">React + TailwindCSS — interface enseignant, formulaires, affichage quiz</text>

  <!-- Flèches frontend <-> backend -->
  <line x1="340" y1="164" x2="340" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="296" x2="340" y2="164" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="360" y="185" dominant-baseline="central" font-size="11" fill="#888">Requêtes HTTP / JWT</text>

  <!-- Couche Logique métier -->
  <rect x="80" y="200" width="520" height="64" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Couche logique métier</text>
  <text x="340" y="246" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0f6e56">Django + DRF — API REST, authentification JWT, génération quiz, export</text>

  <!-- Flèches backend <-> PostgreSQL -->
  <line x1="220" y1="264" x2="220" y2="340" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="200" y1="340" x2="200" y2="264" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Flèches backend <-> OpenAI -->
  <line x1="460" y1="264" x2="460" y2="340" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="340" x2="480" y2="264" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Couche Données -->
  <rect x="60" y="340" width="260" height="64" rx="8" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.8"/>
  <text x="190" y="362" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0c447c">Couche données</text>
  <text x="190" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185fa5">PostgreSQL — utilisateurs, leçons, quiz, questions</text>

  <!-- Services externes -->
  <rect x="360" y="340" width="260" height="64" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
  <text x="490" y="362" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Services externes</text>
  <text x="490" y="386" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854f0b">OpenAI API — génération intelligente de quiz</text>

  <!-- Légende -->
  <line x1="60" y1="468" x2="100" y2="468" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="110" y="472" dominant-baseline="central" font-size="11" fill="#666">Requête</text>
  <line x1="200" y1="468" x2="240" y2="468" stroke="#666" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="250" y="472" dominant-baseline="central" font-size="11" fill="#666">Réponse</text>
</svg>
<p class="legende">EduQuizAI — SchoolUp · CD2IA 2025/2026 · Metz Numeric School</p>
</body>
</html>
