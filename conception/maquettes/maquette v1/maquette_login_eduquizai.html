
<style>
.screen { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem; min-height: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 0.5px solid var(--color-border-tertiary); }
.card { background: var(--color-background-primary); border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); padding: 2rem; width: 340px; }
.logo { text-align: center; margin-bottom: 1.5rem; }
.logo-icon { width: 48px; height: 48px; background: var(--color-background-info); border-radius: var(--border-radius-md); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.logo-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0; }
.logo-sub { font-size: 13px; color: var(--color-text-secondary); margin: 4px 0 0; }
.field { margin-bottom: 1rem; }
.field label { display: block; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
.field input { width: 100%; box-sizing: border-box; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-secondary); color: var(--color-text-primary); }
.btn-primary { width: 100%; padding: 10px; background: var(--color-background-info); color: var(--color-text-info); border: none; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 0.5rem; }
.divider { text-align: center; font-size: 12px; color: var(--color-text-tertiary); margin: 1rem 0; }
.link { text-align: center; font-size: 13px; color: var(--color-text-secondary); margin-top: 1rem; }
.link a { color: var(--color-text-info); text-decoration: none; }
.tab-bar { display: flex; gap: 0; margin-bottom: 1.5rem; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); overflow: hidden; }
.tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; cursor: pointer; background: var(--color-background-primary); color: var(--color-text-secondary); border: none; }
.tab.active { background: var(--color-background-info); color: var(--color-text-info); font-weight: 500; }
.page-label { font-size: 11px; color: var(--color-text-tertiary); text-align: center; margin-bottom: 1rem; letter-spacing: 0.05em; }
</style>

<div class="screen">
  <p class="page-label">MAQUETTE — PAGE LOGIN / INSCRIPTION</p>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <i class="ti ti-brain" style="font-size:24px; color: var(--color-text-info);" aria-hidden="true"></i>
      </div>
      <p class="logo-title">EduQuizAI</p>
      <p class="logo-sub">Générateur intelligent de quiz pédagogiques</p>
    </div>

    <div class="tab-bar">
      <button class="tab active">Connexion</button>
      <button class="tab">Inscription</button>
    </div>

    <div class="field">
      <label>Adresse email</label>
      <input type="text" placeholder="enseignant@ecole.fr" readonly />
    </div>
    <div class="field">
      <label>Mot de passe</label>
      <input type="text" placeholder="••••••••" readonly />
    </div>

    <button class="btn-primary">Se connecter</button>

    <div class="link">
      <a href="#">Mot de passe oublié ?</a>
    </div>
  </div>
</div>
