<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduQuizAI — Nouveau mot de passe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e293b 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
  .page-label { font-size: 11px; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .card { background: rgba(255,255,255,0.97); border-radius: 16px; border: 1px solid #e2e8f0; padding: 2rem; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.25); }
  .logo { text-align: center; margin-bottom: 1.75rem; }
  .logo-icon { width: 52px; height: 52px; background: #eff6ff; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 10px; }
  .logo-icon i { font-size: 26px; color: #3b82f6; }
  .logo-title { font-size: 20px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .logo-sub { font-size: 13px; color: #64748b; }
  .panel { display: none; }
  .panel.active { display: block; }
  .panel-icon { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; background: #eff6ff; }
  .panel-icon i { font-size: 28px; color: #3b82f6; }
  .panel-title { font-size: 16px; font-weight: 700; color: #1e293b; text-align: center; margin-bottom: 6px; }
  .panel-desc { font-size: 13px; color: #64748b; text-align: center; margin-bottom: 1.5rem; line-height: 1.6; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 6px; }
  .password-wrap { position: relative; }
  .password-wrap input { width: 100%; padding: 10px 40px 10px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #1e293b; background: #f8fafc; outline: none; }
  .password-wrap .eye { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 18px; }
  .strength { margin-top: 6px; display: flex; gap: 4px; align-items: center; }
  .strength-bar { flex: 1; height: 4px; border-radius: 99px; background: #e2e8f0; }
  .strength-bar.filled.weak { background: #ef4444; }
  .strength-bar.filled.medium { background: #f59e0b; }
  .strength-bar.filled.strong { background: #22c55e; }
  .strength-label { font-size: 11px; color: #94a3b8; white-space: nowrap; }
  .btn-primary { width: 100%; padding: 11px; background: #3b82f6; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.5rem; }
  .success-check { width: 64px; height: 64px; border-radius: 50%; background: #f0fdf4; border: 2px solid #86efac; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .success-check i { font-size: 32px; color: #16a34a; }
  .btn-login { width: 100%; padding: 11px; background: #16a34a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 0.5rem; }
</style>
</head>
<body>
<p class="page-label">Maquette 3 / 8 — Nouveau mot de passe</p>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><i class="ti ti-brain"></i></div>
    <p class="logo-title">EduQuizAI</p>
    <p class="logo-sub">Réinitialisation du mot de passe</p>
  </div>
  <div class="panel active" id="step1">
    <div class="panel-icon"><i class="ti ti-lock"></i></div>
    <p class="panel-title">Nouveau mot de passe</p>
    <p class="panel-desc">Choisissez un mot de passe sécurisé d'au moins 8 caractères.</p>
    <div class="field">
      <label>Nouveau mot de passe</label>
      <div class="password-wrap">
        <input type="password" placeholder="••••••••" oninput="checkStrength(this.value)" />
        <i class="ti ti-eye eye"></i>
      </div>
      <div class="strength">
        <div class="strength-bar" id="sb1"></div>
        <div class="strength-bar" id="sb2"></div>
        <div class="strength-bar" id="sb3"></div>
        <span class="strength-label" id="slabel">—</span>
      </div>
    </div>
    <div class="field">
      <label>Confirmer le mot de passe</label>
      <div class="password-wrap">
        <input type="password" placeholder="••••••••" />
        <i class="ti ti-eye eye"></i>
      </div>
    </div>
    <button class="btn-primary" onclick="goStep(2)"><i class="ti ti-lock-check"></i> Réinitialiser le mot de passe</button>
  </div>
  <div class="panel" id="step2">
    <div class="success-check"><i class="ti ti-check"></i></div>
    <p class="panel-title">Mot de passe mis à jour !</p>
    <p class="panel-desc">Votre mot de passe a été réinitialisé avec succès. Vous pouvez maintenant vous connecter.</p>
    <button class="btn-login" onclick="goLogin()"><i class="ti ti-login"></i> Se connecter</button>
  </div>
</div>
<script>
function goStep(n) {
  document.getElementById('step1').classList.toggle('active', n === 1);
  document.getElementById('step2').classList.toggle('active', n === 2);
}
function goLogin() { alert('Redirection vers la page de connexion'); }
function checkStrength(v) {
  const s1=document.getElementById('sb1'), s2=document.getElementById('sb2'), s3=document.getElementById('sb3'), sl=document.getElementById('slabel');
  [s1,s2,s3].forEach(b => { b.className='strength-bar'; });
  if (!v) { sl.textContent='—'; return; }
  if (v.length < 6) { s1.classList.add('filled','weak'); sl.textContent='Faible'; sl.style.color='#ef4444'; }
  else if (v.length < 10) { s1.classList.add('filled','medium'); s2.classList.add('filled','medium'); sl.textContent='Moyen'; sl.style.color='#f59e0b'; }
  else { s1.classList.add('filled','strong'); s2.classList.add('filled','strong'); s3.classList.add('filled','strong'); sl.textContent='Fort'; sl.style.color='#22c55e'; }
}
</script>
</body>
</html>
